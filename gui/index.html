<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      This web app is intentionally simple.
      That is we praise the lack of complexity.

      Is it pretentious? No.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
      })();
    </script>
    <link href="./style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
