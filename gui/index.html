<!DOCTYPE html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rebel Explorer</title>
    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="apple-touch-icon" href="./logo.png" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Rebel Explorer" />
    <meta property="og:image" content="./preview.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Rebel Explorer" />
    <meta name="twitter:image" content="./preview.png" />
    <!--
      This web app is intentionally simple.
      That is we praise the lack of complexity.

      Is it pretentious? No.
    -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', saved);
      })();
    </script>
    <link href="./style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="app"></div>

    <script type="module" src="./index.tsx"></script>
  </body>
</html>
